name: Compilar Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Instalar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Permissão Gradle
        run: chmod +x gradlew

      - name: Compilar
        run: ./gradlew build

      - name: Salvar .jar
        uses: actions/upload-artifact@v4
        with:
          name: cosmetico-viltrum-mod
          path: build/libs/*.jar
